# Entity type descriptions for prompt generation (bilingual EN/FR)
# Structure: {layer: {type_name: {en: "...", fr: "..."}}}

core:
  character:
    en: |
      CHARACTER (GOLEM G1):
      - name: primary name as used in text (exact spelling)
      - canonical_name: full name lowercase, no articles (the/a/an)
      - agency: active | passive | ambiguous (DOLCE agentive classification)
      - species: race or species if mentioned
      - aliases: list of alternate names or nicknames
      - description: brief description in chapter context
      - extraction_text: exact source passage
      NOTE: Character roles (protagonist, mentor, etc.) are now extracted as separate NARRATIVE_ROLE entities.
    fr: |
      CHARACTER (GOLEM G1) :
      - name : nom principal utilise dans le texte (orthographe exacte)
      - canonical_name : nom complet en minuscules, sans articles
      - agency : active | passive | ambiguous (classification agentive DOLCE)
      - species : race ou espece si mentionnee
      - aliases : liste de surnoms ou noms alternatifs
      - description : breve description dans le contexte du chapitre
      - extraction_text : passage source exact
      NOTE : Les roles de personnage (protagonist, mentor, etc.) sont maintenant extraits comme des entites NARRATIVE_ROLE separees.

  event:
    en: |
      EVENT (GOLEM G5):
      - name: short descriptive name of the event
      - event_category: action | state_change | achievement | process | dialogue | combat | discovery | revelation | transition | encounter
      - significance: minor | moderate | major | critical | arc_defining
      - participants: list of character canonical_names involved
      - location: canonical_name of where it takes place
      - is_flashback: true if event is narrated as past memory
      - extraction_text: exact source passage
      An EVENT is a significant world-level or multi-participant happening, NOT a single character's action.
      - VALID events: battles, discoveries, system-wide announcements, arrivals, betrayals, deaths
      - NOT events: one character using a skill, one character walking somewhere, system stat notifications
      - Event names should be DESCRIPTIVE ("Battle of the Tutorial Arena"), not character names ("Jake")
    fr: |
      EVENT :
      - name : nom court et descriptif de l'evenement
      - event_category : action | state_change | achievement | process | dialogue | combat | discovery | revelation | transition | encounter
      - significance : minor | moderate | major | critical | arc_defining
      - participants : liste des canonical_names des personnages impliques
      - location : canonical_name du lieu
      - is_flashback : true si l'evenement est narre comme souvenir
      - extraction_text : passage source exact

  location:
    en: |
      LOCATION:
      - name: place name as used in text
      - canonical_name: full name lowercase, no articles
      - location_type: city | dungeon | realm | continent | pocket_dimension | planet | forest | mountain | building | region
      - parent_location: canonical_name of containing location if any
      - description: brief description in chapter context
      - extraction_text: exact source passage
    fr: |
      LOCATION :
      - name : nom du lieu tel qu'utilise dans le texte
      - canonical_name : nom complet en minuscules, sans articles
      - location_type : city | dungeon | realm | continent | pocket_dimension | planet | forest | mountain | building | region
      - parent_location : canonical_name du lieu englobant si applicable
      - description : breve description dans le contexte du chapitre
      - extraction_text : passage source exact

  object:
    en: |
      OBJECT (GOLEM G16, ex-Item):
      - name: object name as used in text
      - canonical_name: full name lowercase, no articles
      - description: REQUIRED — brief description of the object (what it does, why it matters)
      - object_type: weapon | armor | consumable | artifact | key_item | tool | material
      - rarity: common | uncommon | rare | epic | legendary | unique
      - effects: list of mechanical or narrative effects
      - owner: canonical_name of current possessor
      - extraction_text: exact source passage
      IMPORTANT: Always provide a description, even if brief. "A powerful bow" is better than empty.
    fr: |
      OBJECT (GOLEM G16, ex-Item) :
      - name : nom de l'objet tel qu'utilise dans le texte
      - canonical_name : nom complet en minuscules, sans articles
      - description : OBLIGATOIRE — breve description de l'objet (fonction, importance)
      - object_type : weapon | armor | consumable | artifact | key_item | tool | material
      - rarity : common | uncommon | rare | epic | legendary | unique
      - effects : liste des effets mecaniques ou narratifs
      - owner : canonical_name du possesseur actuel
      - extraction_text : passage source exact

  creature:
    en: |
      CREATURE:
      - name: creature name as used in text
      - canonical_name: full name lowercase, no articles
      - species: species or monster type
      - threat_level: threat level if mentioned (e.g. B-rank, level 50)
      - habitat: where this creature is typically found
      - description: brief description in chapter context
      - extraction_text: exact source passage
    fr: |
      CREATURE :
      - name : nom de la creature tel qu'utilise dans le texte
      - canonical_name : nom complet en minuscules, sans articles
      - species : espece ou type de monstre
      - threat_level : niveau de menace si mentionne (ex. rang B, niveau 50)
      - habitat : lieu ou cette creature se trouve generalement
      - description : breve description dans le contexte du chapitre
      - extraction_text : passage source exact

  faction:
    en: |
      FACTION:
      - name: faction name as used in text
      - canonical_name: full name lowercase, no articles
      - faction_type: guild | clan | kingdom | order | tribe | company | alliance
      - alignment: lawful | neutral | chaotic | evil | good
      - description: brief description in chapter context
      - extraction_text: exact source passage
    fr: |
      FACTION :
      - name : nom de la faction tel qu'utilise dans le texte
      - canonical_name : nom complet en minuscules, sans articles
      - faction_type : guild | clan | kingdom | order | tribe | company | alliance
      - alignment : lawful | neutral | chaotic | evil | good
      - description : breve description dans le contexte du chapitre
      - extraction_text : passage source exact

  concept:
    en: |
      CONCEPT:
      - name: concept name as used in text
      - canonical_name: full name lowercase, no articles
      - domain: magic | technology | philosophy | religion | politics | nature | other
      - description: brief description in chapter context
      - extraction_text: exact source passage
      Game mechanics (stats, mana, XP) should use stat_change or genre_entity (sub_type="stat"), NOT Concept.
      Concepts are narrative abstractions: themes, philosophies, in-world theoretical ideas.
    fr: |
      CONCEPT :
      - name : nom du concept tel qu'utilise dans le texte
      - canonical_name : nom complet en minuscules, sans articles
      - domain : magic | technology | philosophy | religion | politics | nature | other
      - description : breve description dans le contexte du chapitre
      - extraction_text : passage source exact

  narrative_sequence:
    en: |
      NARRATIVE_SEQUENCE (GOLEM G7, ex-Arc):
      - name: narrative sequence or storyline name
      - canonical_name: full name lowercase, no articles
      - sequence_type: main_plot | subplot | character_arc | world_arc
      - status: active | completed | abandoned
      - sequence_order: position in the work (integer)
      - related_events: IMPORTANT — list event names that belong to this sequence (enables event-to-arc linking)
      - description: brief description in chapter context
      - extraction_text: exact source passage
      Always try to list the events that belong to this narrative arc in related_events.
    fr: |
      NARRATIVE_SEQUENCE (GOLEM G7, ex-Arc) :
      - name : nom de la sequence narrative ou arc
      - canonical_name : nom complet en minuscules, sans articles
      - sequence_type : main_plot | subplot | character_arc | world_arc
      - status : active | completed | abandoned
      - sequence_order : position dans l'oeuvre (entier)
      - description : breve description dans le contexte du chapitre
      - extraction_text : passage source exact

  prophecy:
    en: |
      PROPHECY:
      - name: prophecy name or short identifier
      - canonical_name: full name lowercase, no articles
      - status: unfulfilled | fulfilled | subverted
      - description: brief description in chapter context
      - extraction_text: exact source passage
    fr: |
      PROPHECY :
      - name : nom ou identifiant court de la prophetie
      - canonical_name : nom complet en minuscules, sans articles
      - status : unfulfilled | fulfilled | subverted
      - description : breve description dans le contexte du chapitre
      - extraction_text : passage source exact

  psychological_state:
    en: |
      PSYCHOLOGICAL_STATE (GOLEM G3):
      - character: canonical_name of the character experiencing this state
      - state_type: emotion | motivation | belief | goal | fear
      - name: state name (e.g. "determination", "fear of failure", "desire for power")
      - description: brief description of the state in context
      - trigger_event: IMPORTANT — name of the event that caused this state. Try hard to identify what triggered this emotion/belief/motivation.
      - intensity: 0.0 to 1.0 (how strong is this state)
      - extraction_text: exact source passage
      A PSYCHOLOGICAL_STATE is a temporal mental state of a character, NOT an action or event.
      - VALID: "Jake felt a surge of determination after the battle" → state_type=emotion, name="determination", trigger_event="Battle of the Arena"
      - NOT a psychological_state: "Jake ran fast" (action/event), "Jake is brave" (character_feature)
    fr: |
      PSYCHOLOGICAL_STATE (GOLEM G3) :
      - character : canonical_name du personnage concerne
      - state_type : emotion | motivation | belief | goal | fear
      - name : nom de l'etat (ex. "determination", "peur de l'echec")
      - description : breve description de l'etat en contexte
      - trigger_event : nom de l'evenement declencheur (si identifiable)
      - intensity : 0.0 a 1.0
      - extraction_text : passage source exact
      Un PSYCHOLOGICAL_STATE est un etat mental temporel, PAS une action ni un evenement.

  setting:
    en: |
      SETTING (GOLEM G12):
      - name: setting name (e.g. "The Tutorial", "Nevermore", "The Multiverse")
      - setting_type: world | era | dimension | realm | zone | instance
      - description: brief description of this narrative world/context
      - extraction_text: exact source passage
      A SETTING is a narrative world or context container. It is NOT a physical location.
      - VALID settings: "The Tutorial" (game world), "Nevermore" (entire dimension), "The 93 Universes" (cosmological context)
      - NOT a setting: "The forest north of camp" (Location), "Floor 37" (Location/genre_entity), "Jake's house" (Location)
    fr: |
      SETTING (GOLEM G12) :
      - name : nom du setting (ex. "Le Tutoriel", "Nevermore")
      - setting_type : world | era | dimension | realm | zone | instance
      - description : breve description de cet univers narratif
      - extraction_text : passage source exact
      Un SETTING est un monde narratif ou conteneur de contexte, PAS un lieu physique.

  character_feature:
    en: |
      CHARACTER_FEATURE (GOLEM G17):
      - character: canonical_name of the character
      - feature_type: biographical | physical | psychological
      - name: feature name (e.g. "green eyes", "human", "loner", "born in New Haven")
      - description: brief description
      - extraction_text: exact source passage
      A CHARACTER_FEATURE is a persistent trait of a character, NOT a temporary state or action.
      - biographical: "Jake is human", "born in New Haven" — facts about identity/history
      - physical: "green eyes", "tall", "scarred left arm" — observable physical traits
      - psychological: "loner", "stubborn", "charismatic" — personality traits
      - NOT a character_feature: "Jake is scared" (PsychologicalState), "Jake acts as mentor" (NarrativeRole)
    fr: |
      CHARACTER_FEATURE (GOLEM G17) :
      - character : canonical_name du personnage
      - feature_type : biographical | physical | psychological
      - name : nom du trait (ex. "yeux verts", "humain", "solitaire")
      - description : breve description
      - extraction_text : passage source exact
      Un CHARACTER_FEATURE est un trait persistant, PAS un etat temporaire ni une action.

  narrative_role:
    en: |
      NARRATIVE_ROLE (GOLEM G11):
      - character: canonical_name of the character
      - role_type: protagonist | antagonist | mentor | trickster | herald | guardian | shadow | shapeshifter | narrator | deuteragonist | foil
      - context: in which arc or context this role applies
      - extraction_text: exact source passage
      A NARRATIVE_ROLE is a functional role in the story, NOT a character trait.
      - VALID: "Jake took on the role of mentor for Miranda" → role_type=mentor
      - NOT a narrative_role: "Jake is brave" (CharacterFeature), "Jake is determined" (PsychologicalState)
    fr: |
      NARRATIVE_ROLE (GOLEM G11) :
      - character : canonical_name du personnage
      - role_type : protagonist | antagonist | mentor | trickster | herald | guardian | shadow | shapeshifter | narrator | deuteragonist | foil
      - context : dans quel arc ou contexte ce role s'applique
      - extraction_text : passage source exact
      Un NARRATIVE_ROLE est un role fonctionnel dans l'histoire, PAS un trait de personnage.

  social_relationship:
    en: |
      SOCIAL_RELATIONSHIP (GOLEM G4):
      - participants: list of 2+ character canonical_names involved (MUST have at least 2)
      - relationship_type: friendship | rivalry | romance | family | mentorship | patron | alliance | enmity | professional | worship
      - name: DESCRIPTIVE name like "Jake-Casper friendship" or "Viper mentorship of Jake". NEVER use a character name alone.
      - description: brief description of the relationship
      - trigger_event: name of the event that created or changed this relationship
      - extraction_text: exact source passage
      A SOCIAL_RELATIONSHIP is a reified relationship between characters — it has its own history.
      - VALID: "The friendship between Jake and Casper deepened" → name="jake-casper friendship", participants=["jake","casper"]
      - WRONG name: "jake" — this is a character name, not a relationship name
      - NOT a social_relationship: "Jake hit Casper" (Event), "Jake likes Casper" (PsychologicalState)
    fr: |
      SOCIAL_RELATIONSHIP (GOLEM G4) :
      - participants : liste de 2+ canonical_names de personnages impliques (MINIMUM 2)
      - relationship_type : friendship | rivalry | romance | family | mentorship | patron | alliance | enmity | professional | worship
      - name : nom DESCRIPTIF comme "jake-casper friendship". JAMAIS un nom de personnage seul.
      - description : breve description de la relation
      - trigger_event : nom de l'evenement createur ou modificateur
      - extraction_text : passage source exact
      Un SOCIAL_RELATIONSHIP est une relation reifiee entre personnages — elle a sa propre histoire.

genre:
  skill:
    en: |
      SKILL (use entity_type="genre_entity", sub_type="skill"):
      - name: exact skill name as mentioned
      - skill_type: active | passive | racial | class | profession | unique
      - rank: common | uncommon | rare | epic | legendary | transcendent | divine
      - owner: character who possesses this skill
      - effects: list of mechanical effects
      - extraction_text: exact source passage
    fr: |
      SKILL (utiliser entity_type="genre_entity", sub_type="skill") :
      - name : nom exact de la competence
      - skill_type : active | passive | racial | class | profession | unique
      - rank : common | uncommon | rare | epic | legendary | transcendent | divine
      - owner : personnage possedant cette competence
      - effects : liste des effets mecaniques
      - extraction_text : passage source exact

  class_:
    en: |
      CLASS (use entity_type="genre_entity", sub_type="class"):
      - name: class name as mentioned
      - tier: class tier or grade if mentioned
      - owner: character who holds this class
      - description: brief description of class abilities
      - extraction_text: exact source passage
    fr: |
      CLASS (utiliser entity_type="genre_entity", sub_type="class") :
      - name : nom de la classe
      - tier : palier ou grade si mentionne
      - owner : personnage possedant cette classe
      - description : breve description des capacites
      - extraction_text : passage source exact

  title:
    en: |
      TITLE (use entity_type="genre_entity", sub_type="title"):
      - name: title as mentioned in text
      - effects: bonuses or abilities granted by this title
      - owner: character who holds this title
      - extraction_text: exact source passage
    fr: |
      TITLE (utiliser entity_type="genre_entity", sub_type="title") :
      - name : titre tel que mentionne dans le texte
      - effects : bonus ou capacites conferes par ce titre
      - owner : personnage possedant ce titre
      - extraction_text : passage source exact

  system:
    en: |
      SYSTEM (use entity_type="genre_entity", sub_type="system"):
      - name: system name as mentioned
      - system_type: cultivation | class_based | skill_based | stat_based | hybrid
      - description: how the system works in this world
      - extraction_text: exact source passage
    fr: |
      SYSTEM (utiliser entity_type="genre_entity", sub_type="system") :
      - name : nom du systeme
      - system_type : cultivation | class_based | skill_based | stat_based | hybrid
      - description : fonctionnement du systeme dans ce monde
      - extraction_text : passage source exact

  level:
    en: |
      LEVEL (use entity_type="level_change"):
      - character: canonical_name of the character
      - old_level: previous level if mentioned
      - new_level: new level reached
      - realm: cultivation realm if applicable
      - extraction_text: exact source passage
    fr: |
      LEVEL (utiliser entity_type="level_change") :
      - character : canonical_name du personnage
      - old_level : niveau precedent si mentionne
      - new_level : nouveau niveau atteint
      - realm : domaine de cultivation si applicable
      - extraction_text : passage source exact

  race:
    en: |
      RACE (use entity_type="genre_entity", sub_type="race"):
      - name: race name as mentioned
      - traits: distinctive racial characteristics
      - typical_abilities: common racial abilities
      - description: brief description in chapter context
      - extraction_text: exact source passage
    fr: |
      RACE (utiliser entity_type="genre_entity", sub_type="race") :
      - name : nom de la race
      - traits : caracteristiques raciales distinctives
      - typical_abilities : capacites raciales communes
      - description : breve description dans le contexte du chapitre
      - extraction_text : passage source exact

  stat_block:
    en: |
      STAT_BLOCK (use entity_type="genre_entity", sub_type="stat_block"):
      - character_name: canonical_name of the character
      - stats: JSON object of stat names and values
      - source: blue_box | narrative | inferred
      - extraction_text: exact source passage
    fr: |
      STAT_BLOCK (utiliser entity_type="genre_entity", sub_type="stat_block") :
      - character_name : canonical_name du personnage
      - stats : objet JSON des noms et valeurs de stats
      - source : blue_box | narrative | inferred
      - extraction_text : passage source exact

  quest:
    en: |
      QUEST (use entity_type="genre_entity", sub_type="quest"):
      - name: quest name as mentioned
      - quest_type: main | side | daily | hidden | world
      - status: active | completed | failed
      - reward: reward if mentioned
      - extraction_text: exact source passage
    fr: |
      QUEST (utiliser entity_type="genre_entity", sub_type="quest") :
      - name : nom de la quete
      - quest_type : main | side | daily | hidden | world
      - status : active | completed | failed
      - reward : recompense si mentionnee
      - extraction_text : passage source exact

  achievement:
    en: |
      ACHIEVEMENT (use entity_type="genre_entity", sub_type="achievement"):
      - name: achievement name as mentioned
      - effects: bonuses or rewards granted
      - earned_by: canonical_name of the character
      - extraction_text: exact source passage
    fr: |
      ACHIEVEMENT (utiliser entity_type="genre_entity", sub_type="achievement") :
      - name : nom du haut fait
      - effects : bonus ou recompenses conferes
      - earned_by : canonical_name du personnage
      - extraction_text : passage source exact

  realm:
    en: |
      REALM (use entity_type="genre_entity", sub_type="realm"):
      - name: realm or cultivation stage name
      - grade: grade or rank of this realm
      - description: brief description of realm characteristics
      - extraction_text: exact source passage
    fr: |
      REALM (utiliser entity_type="genre_entity", sub_type="realm") :
      - name : nom du domaine ou palier de cultivation
      - grade : grade ou rang de ce domaine
      - description : breve description des caracteristiques
      - extraction_text : passage source exact

series:
  bloodline:
