      BLOODLINE (use entity_type="genre_entity", sub_type="bloodline"):
      - name: bloodline or heritage name
      - owner: character bearing this bloodline
      - effects: inherited abilities
      - origin: source if mentioned
      - extraction_text: exact source passage
    fr: |
      BLOODLINE (utiliser entity_type="genre_entity", sub_type="bloodline") :
      - name : nom du lignage
      - owner : personnage porteur
      - effects : capacites heritees
      - origin : source si mentionnee
      - extraction_text : passage source exact

  profession:
    en: |
      PROFESSION (use entity_type="genre_entity", sub_type="profession"):
      - name: profession name
      - owner: character with this profession
      - rank: profession rank if mentioned
      - extraction_text: exact source passage
    fr: |
      PROFESSION (utiliser entity_type="genre_entity", sub_type="profession") :
      - name : nom de la profession
      - owner : personnage possedant cette profession
      - rank : rang de profession si mentionne
      - extraction_text : passage source exact

  church:
    en: |
      CHURCH (use entity_type="genre_entity", sub_type="church"):
      - name: church or religious order name
      - deity: associated deity if mentioned
      - description: brief description
      - extraction_text: exact source passage
    fr: |
      CHURCH (utiliser entity_type="genre_entity", sub_type="church") :
      - name : nom de l'eglise ou ordre religieux
      - deity : divinite associee si mentionnee
      - description : breve description
      - extraction_text : passage source exact

  alchemy_recipe:
    en: |
      ALCHEMY_RECIPE (use entity_type="genre_entity", sub_type="alchemy_recipe"):
      - name: recipe or potion name
      - ingredients: list of required ingredients
      - effects: resulting effects
      - extraction_text: exact source passage
    fr: |
      ALCHEMY_RECIPE (utiliser entity_type="genre_entity", sub_type="alchemy_recipe") :
      - name : nom de la recette ou potion
      - ingredients : liste des ingredients requis
      - effects : effets resultants
      - extraction_text : passage source exact

  floor:
    en: |
      FLOOR (use entity_type="genre_entity", sub_type="floor"):
      - name: floor or level identifier (e.g. "Floor 37")
      - difficulty: difficulty rating if mentioned
      - description: brief description
      - extraction_text: exact source passage
    fr: |
      FLOOR (utiliser entity_type="genre_entity", sub_type="floor") :
      - name : identifiant de l'etage (ex. "Etage 37")
      - difficulty : difficulte si mentionnee
      - description : breve description
      - extraction_text : passage source exact
