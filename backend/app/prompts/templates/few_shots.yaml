# Few-shot examples for extraction pipeline prompt generation (bilingual EN/FR)
# Structure: {genre_name: {phase: {language: "example text"}}}

litrpg:
  entities:
    en: |
      Example input:
      ---
      Jake opened his eyes. His level had just reached 42. A new skill
      "Thunderstrike" appeared in his list. He was in the Shadow Cavern,
      a B-rank dungeon known for its deadly traps.
      [Level 42 reached!]
      [New Skill: Thunderstrike (Active) — Unleashes a lightning-charged
      attack dealing 300% base damage.]
      ---

      Example output:
      ```json
      [
        {
          "entity_type": "character",
          "name": "Jake",
          "canonical_name": "jake",
          "agency": "active",
          "extraction_text": "Jake opened his eyes."
        },
        {
          "entity_type": "genre_entity",
          "sub_type": "skill",
          "name": "Thunderstrike",
          "rank": "unknown",
          "owner": "jake",
          "description": "Lightning-charged attack dealing 300% base damage.",
          "extraction_text": "Thunderstrike (Active) — Unleashes a lightning-charged attack dealing 300% base damage."
        },
        {
          "entity_type": "location",
          "name": "Shadow Cavern",
          "canonical_name": "shadow cavern",
          "location_type": "dungeon",
          "description": "B-rank dungeon known for its deadly traps.",
          "extraction_text": "the Shadow Cavern, a B-rank dungeon known for its deadly traps."
        },
        {
          "entity_type": "level_change",
          "character": "jake",
          "new_level": 42,
          "extraction_text": "His level had just reached 42."
        }
      ]
      ```
    fr: |
      Exemple d'entree :
      ---
      Jake ouvrit les yeux. Son niveau venait de passer a 42. Une nouvelle
      competence "Frappe Foudroyante" apparut dans sa liste. Il se trouvait
      dans la Caverne des Ombres, un donjon de rang B.
      [Niveau 42 atteint !]
      [Nouvelle competence : Frappe Foudroyante (Active)]
      ---

      Exemple de sortie :
      ```json
      [
        {
          "entity_type": "character",
          "name": "Jake",
          "canonical_name": "jake",
          "agency": "active",
          "extraction_text": "Jake ouvrit les yeux."
        },
        {
          "entity_type": "genre_entity",
          "sub_type": "skill",
          "name": "Frappe Foudroyante",
          "rank": "unknown",
          "owner": "jake",
          "extraction_text": "Frappe Foudroyante (Active)"
        },
        {
          "entity_type": "location",
          "name": "Caverne des Ombres",
          "canonical_name": "caverne des ombres",
          "location_type": "dungeon",
          "extraction_text": "la Caverne des Ombres, un donjon de rang B."
        },
        {
          "entity_type": "level_change",
          "character": "jake",
          "new_level": 42,
          "extraction_text": "Son niveau venait de passer a 42."
        }
      ]
      ```
  relations:
    en: |
      Example input (entities already extracted):
      ```json
      [
        {"entity_type": "character", "canonical_name": "jake"},
        {"entity_type": "character", "canonical_name": "aria"},
        {"entity_type": "genre_entity", "sub_type": "skill", "name": "thunderstrike"},
        {"entity_type": "faction", "canonical_name": "hunters guild"}
      ]
      ```

      Text: Jake and Aria were allies within the Hunters Guild. Jake had just
      mastered Thunderstrike during the siege. Aria lost her "Arcane Shield"
      skill after being cursed.

      Example output:
      ```json
      {
        "relations": [
          {"relation_type": "RELATES_TO", "source": "jake", "target": "aria",
           "subtype": "ally", "sentiment": 0.8},
          {"relation_type": "MEMBER_OF", "source": "jake", "target": "hunters guild"},
          {"relation_type": "MEMBER_OF", "source": "aria", "target": "hunters guild"},
          {"relation_type": "HAS_SKILL", "source": "jake", "target": "thunderstrike"}
        ],
        "ended_relations": [
          {"relation_type": "HAS_SKILL", "source": "aria", "target": "arcane shield",
           "reason": "skill_lost"}
        ]
      }
      ```
    fr: |
      Exemple d'entree (entites deja extraites) :
      ```json
      [
        {"entity_type": "character", "canonical_name": "jake"},
        {"entity_type": "character", "canonical_name": "aria"},
        {"entity_type": "genre_entity", "sub_type": "skill", "name": "frappe foudroyante"},
        {"entity_type": "faction", "canonical_name": "guilde des chasseurs"}
      ]
      ```

      Texte : Jake et Aria etaient allies au sein de la Guilde des Chasseurs.
      Jake venait de maitriser la Frappe Foudroyante durant le siege.
      Aria perdit sa competence "Bouclier Arcanique" apres avoir ete maudite.

      Exemple de sortie :
      ```json
      {
        "relations": [
          {"relation_type": "RELATES_TO", "source": "jake", "target": "aria",
           "subtype": "ally", "sentiment": 0.8},
          {"relation_type": "MEMBER_OF", "source": "jake", "target": "guilde des chasseurs"},
          {"relation_type": "MEMBER_OF", "source": "aria", "target": "guilde des chasseurs"},
          {"relation_type": "HAS_SKILL", "source": "jake", "target": "frappe foudroyante"}
        ],
        "ended_relations": [
          {"relation_type": "HAS_SKILL", "source": "aria", "target": "bouclier arcanique",
           "reason": "skill_lost"}
        ]
      }
      ```

  negative_examples:
    en: |
      The following are INCORRECT extractions. Do NOT make these mistakes:

      1. Text: "The warrior swung his blade at the approaching creature."
         WRONG: {"entity_type": "character", "name": "The warrior"}
         WHY: Generic role description, not a named character. Only extract named individuals.

      2. Text: "An old man watched from the shadows as the ritual began."
         WRONG: {"entity_type": "character", "name": "Old man"}
         WHY: Generic description, not a proper name. Do not extract unnamed individuals.

      3. Text: "Jake activated his new skill, feeling power surge through him."
         WRONG: {"entity_type": "event", "name": "Jake activated his new skill"}
         WHY: This is a skill usage, not a narrative event. Extract as a mention of an existing skill, not as a new event.

      4. Text: "The heavy warrior blocked the attack with his shield."
         WRONG: {"entity_type": "character", "name": "heavy warrior"}
         WHY: "Heavy warrior" is a role descriptor. Only extract if the text reveals the character's actual name.

      5. Text: "A scout reported back to the camp."
         WRONG: {"entity_type": "character", "name": "a scout"}
         WHY: Indefinite article + generic role. Not a named entity.

      6. Text: "Jake reached level 24!"
         WRONG: {"entity_type": "event", "name": "jake levels to 24"}
         WHY: Level-ups use entity_type="level_change" with character + new_level fields. Never create Events named after characters or their actions.

      7. Text: "Jake activated Shadow Step and dodged the attack."
         WRONG: {"entity_type": "event", "name": "jake activated Shadow Step"}
         WHY: A single character using a skill is NOT an Event. Events are world-level happenings (battles, discoveries, system announcements) involving multiple participants.

      8. Text: "+5 Free Points, +3 Perception"
         WRONG: {"entity_type": "concept", "name": "free points"}
         RIGHT: {"entity_type": "stat_change", "character": "jake", "stat_name": "Free Points", "value": 5} or {"entity_type": "genre_entity", "sub_type": "stat", "name": "Perception"}
         WHY: Game stats and mechanics are part of the progression system. Extract them as stat_change, level_change, or genre_entity (sub_type="stat"/"system") — NOT as Concepts or Items.

      9. Text: "Jake walked through the Dark Forest."
         WRONG: {"entity_type": "concept", "name": "jake"} or {"entity_type": "narrative_sequence", "name": "jake"}
         WHY: If an entity is already known as a Character, do NOT re-extract it as any other type (Event, Concept, Arc, Item, etc.).

      10. Text: "The System awarded 2500 XP for the kill."
          WRONG: {"entity_type": "event", "name": "the System awarded 2500 XP"}
          WHY: System notifications are not Events. XP awards are game mechanics, not narrative events.

      11. Text: "Jake felt a surge of determination as he faced the beast."
          WRONG: {"entity_type": "event", "name": "Jake felt determination"}
          RIGHT: {"entity_type": "psychological_state", "character": "jake", "state_type": "emotion", "name": "determination"}
          WHY: Internal mental states are PsychologicalState, not Events. Events are world-level happenings.

      12. Text: "Welcome to the Tutorial, where all new arrivals are tested."
          WRONG: {"entity_type": "location", "name": "The Tutorial", "location_type": "dungeon"}
          RIGHT: {"entity_type": "setting", "name": "The Tutorial", "setting_type": "instance"}
          WHY: "The Tutorial" is a narrative world/context (Setting), not a physical location. It contains locations.

      13. Text: "Jake was brave and had green eyes."
          WRONG: {"entity_type": "narrative_role", "character": "jake", "role_type": "protagonist"}
          RIGHT: {"entity_type": "character_feature", "character": "jake", "feature_type": "psychological", "name": "brave"}
          WHY: "Brave" is a personality trait (CharacterFeature), not a narrative role. NarrativeRole is about story function (protagonist, mentor).
    fr: |
      Les extractions suivantes sont INCORRECTES. NE PAS faire ces erreurs :

      1. Texte : "Le guerrier brandit son epee vers la creature."
         FAUX : {"entity_type": "character", "name": "Le guerrier"}
         POURQUOI : Description de role generique, pas un personnage nomme.

      2. Texte : "Un vieil homme observait depuis les ombres."
         FAUX : {"entity_type": "character", "name": "Vieil homme"}
         POURQUOI : Description generique, pas un nom propre.

      3. Texte : "Jake activa sa nouvelle competence, sentant le pouvoir affluer."
         FAUX : {"entity_type": "event", "name": "Jake activa sa nouvelle competence"}
         POURQUOI : C'est une utilisation de competence, pas un evenement narratif.

      4. Texte : "Un eclaireur fit son rapport au camp."
         FAUX : {"entity_type": "character", "name": "un eclaireur"}
         POURQUOI : Article indefini + role generique. Pas une entite nommee.

      6. Texte : "Jake atteint le niveau 24 !"
         FAUX : {"entity_type": "event", "name": "jake atteint le niveau 24"}
         POURQUOI : Les montees de niveau utilisent entity_type="level_change" avec les champs character + new_level. Ne jamais creer des Evenements nommes d'apres des personnages ou leurs actions.

      7. Texte : "Jake activa Pas de l'Ombre et esquiva l'attaque."
         FAUX : {"entity_type": "event", "name": "jake activa Pas de l'Ombre"}
         POURQUOI : Un personnage utilisant une competence seul n'est PAS un Evenement. Les Evenements sont des faits mondiaux (batailles, decouvertes, annonces systeme) impliquant plusieurs participants.

      8. Texte : "+5 Points Libres, +3 Perception"
         FAUX : {"entity_type": "concept", "name": "points libres"}
         CORRECT : {"entity_type": "stat_change", "character": "jake", "stat_name": "Points Libres", "value": 5} ou {"entity_type": "genre_entity", "sub_type": "stat", "name": "Perception"}
         POURQUOI : Les stats et mecaniques font partie du systeme de progression. Extraire comme stat_change, level_change, ou genre_entity (sub_type="stat"/"system") — PAS comme Concepts ou Items.

      9. Texte : "Jake traversa la Foret Sombre."
         FAUX : {"entity_type": "concept", "name": "jake"} ou {"entity_type": "narrative_sequence", "name": "jake"}
         POURQUOI : Si une entite est deja connue comme Personnage, ne PAS la re-extraire sous un autre type.

      10. Texte : "Le Systeme accorda 2500 XP pour le meurtre."
          FAUX : {"entity_type": "event", "name": "le Systeme accorda 2500 XP"}
          POURQUOI : Les notifications systeme ne sont pas des Evenements. Les recompenses XP sont des mecaniques de jeu, pas des evenements narratifs.

      11. Texte : "Jake ressentit une vague de determination face a la bete."
          FAUX : {"entity_type": "event", "name": "Jake ressentit de la determination"}
          CORRECT : {"entity_type": "psychological_state", "character": "jake", "state_type": "emotion", "name": "determination"}
          POURQUOI : Les etats mentaux internes sont des PsychologicalState, pas des Evenements.

      12. Texte : "Bienvenue dans le Tutoriel, ou tous les nouveaux arrivants sont testes."
          FAUX : {"entity_type": "location", "name": "Le Tutoriel", "location_type": "dungeon"}
          CORRECT : {"entity_type": "setting", "name": "Le Tutoriel", "setting_type": "instance"}
          POURQUOI : "Le Tutoriel" est un monde narratif (Setting), pas un lieu physique. Il contient des lieux.

      13. Texte : "Jake etait courageux et avait les yeux verts."
          FAUX : {"entity_type": "narrative_role", "character": "jake", "role_type": "protagonist"}
          CORRECT : {"entity_type": "character_feature", "character": "jake", "feature_type": "psychological", "name": "courageux"}
          POURQUOI : "Courageux" est un trait de personnalite (CharacterFeature), pas un role narratif.

core:
  entities:
    en: |
      Example input:
      ---
      Mr. and Mrs. Dursley, of number four Privet Drive, were proud to say
      that they were perfectly normal. Their son Dudley was the apple of
      their eye.
      ---

      Example output:
      ```json
      [
        {"entity_type": "character", "name": "Mr. Dursley", "canonical_name": "vernon dursley", "agency": "active"},
        {"entity_type": "character", "name": "Mrs. Dursley", "canonical_name": "petunia dursley", "agency": "active"},
        {"entity_type": "character", "name": "Dudley", "canonical_name": "dudley dursley", "agency": "active"},
        {"entity_type": "location", "name": "number four Privet Drive", "canonical_name": "privet drive", "location_type": "building"}
      ]
      ```
    fr: |
      Exemple d'entree :
      ---
      M. et Mme Dursley, du numero quatre Privet Drive, etaient fiers de
      dire qu'ils etaient parfaitement normaux. Leur fils Dudley etait la
      prunelle de leurs yeux.
      ---

      Exemple de sortie :
      ```json
      [
        {"entity_type": "character", "name": "M. Dursley", "canonical_name": "vernon dursley", "agency": "active"},
        {"entity_type": "character", "name": "Mme Dursley", "canonical_name": "petunia dursley", "agency": "active"},
        {"entity_type": "character", "name": "Dudley", "canonical_name": "dudley dursley", "agency": "active"},
        {"entity_type": "location", "name": "numero quatre Privet Drive", "canonical_name": "privet drive", "location_type": "building"}
      ]
      ```
  negative_examples:
    en: |
      The following are INCORRECT extractions. Do NOT make these mistakes:

      1. Text: "The tall stranger entered the room quietly."
         WRONG: {"entity_type": "character", "name": "The tall stranger"}
         WHY: Generic description, not a named character.

      2. Text: "A woman screamed from the upper floor."
         WRONG: {"entity_type": "character", "name": "A woman"}
         WHY: Indefinite unnamed person. Only extract named individuals.

      3. Text: "He opened the door and stepped outside."
         WRONG: {"entity_type": "event", "name": "He opened the door"}
         WHY: Mundane action, not a narrative event worth tracking.
    fr: |
      Les extractions suivantes sont INCORRECTES :

      1. Texte : "Le grand inconnu entra dans la piece."
         FAUX : {"entity_type": "character", "name": "Le grand inconnu"}
         POURQUOI : Description generique, pas un personnage nomme.

      2. Texte : "Une femme cria depuis l'etage."
         FAUX : {"entity_type": "character", "name": "Une femme"}
         POURQUOI : Personne indefinie non nommee.
