# WorldRAG Ontology — Layer 2: LitRPG / Fantasy / Sci-Fi
#
# Genre-specific entities for progression fantasy and LitRPG systems.
# Extends Layer 1 Core Narrative with game-like progression mechanics.

version: "3.0.0"
layer: genre

extends: core.yaml

node_types:
  # === PROGRESSION SYSTEM ===
  System:
    properties:
      name: { type: string, required: true, unique: true }
      description: { type: string }
      system_type: { type: enum, values: [cultivation, class_based, skill_based, stat_based, hybrid] }

  Class:
    properties:
      name: { type: string, required: true }
      description: { type: string }
      tier: { type: integer }
      requirements: { type: string_array }
      system_name: { type: string }
    constraints:
      - unique: [name, system_name]
    indexes:
      - fulltext: [name, description]

  Skill:
    properties:
      name: { type: string, required: true }
      description: { type: string }
      skill_type: { type: enum, values: [active, passive, racial, class, profession, unique] }
      rank: { type: enum, values: [common, uncommon, rare, epic, legendary, transcendent, divine] }
      effects: { type: string_array }
      system_name: { type: string }
    constraints:
      - unique: [name, system_name]
    indexes:
      - fulltext: [name, description]

  Title:
    properties:
      name: { type: string, required: true, unique: true }
      description: { type: string }
      effects: { type: string_array }
      requirements: { type: string }

  Level:
    properties:
      value: { type: integer, required: true }
      realm: { type: string }  # e.g., "mortal", "D-grade", "C-grade"
      stage: { type: string }  # e.g., "early", "middle", "late", "peak"

  # === CREATURES & RACES ===
  Race:
    properties:
      name: { type: string, required: true, unique: true }
      description: { type: string }
      traits: { type: string_array }
      typical_abilities: { type: string_array }

  Creature:
    properties:
      name: { type: string, required: true }
      description: { type: string }
      species: { type: string }
      threat_level: { type: string }  # e.g., "F-grade", "E-grade", etc.
      habitat: { type: string }

  StatBlock:
    properties:
      character_name: { type: string, required: true }
      stats: { type: json }
      total: { type: integer }
      source: { type: enum, values: [blue_box, narrative, inferred] }
      chapter: { type: integer, required: true }
    constraints:
      - unique: [character_name, chapter]

  QuestObjective:
    properties:
      name: { type: string, required: true }
      description: { type: string }
      status: { type: enum, values: [active, completed, failed, abandoned] }
      chapter_received: { type: integer }
      chapter_completed: { type: integer }
    constraints:
      - unique: [name]

  Achievement:
    properties:
      name: { type: string, required: true, unique: true }
      description: { type: string }
      effects: { type: string_array }
      earned_by: { type: string }

  Realm:
    properties:
      name: { type: string, required: true, unique: true }
      grade: { type: string }
      description: { type: string }
      order: { type: integer }

relationship_types:
  # === CHARACTER PROGRESSION ===
  HAS_CLASS:
    from: Character
    to: Class
    properties:
      valid_from_chapter: { type: integer, required: true }
      valid_to_chapter: { type: integer }
      acquisition_event: { type: string }

  HAS_SKILL:
    from: Character
    to: Skill
    properties:
      valid_from_chapter: { type: integer, required: true }
      valid_to_chapter: { type: integer }
      skill_level: { type: integer }

  HAS_TITLE:
    from: Character
    to: Title
    properties:
      acquired_chapter: { type: integer, required: true }

  AT_LEVEL:
    from: Character
    to: Level
    properties:
      valid_from_chapter: { type: integer, required: true }
      valid_to_chapter: { type: integer }

  IS_RACE:
    from: Character
    to: Race

  # === SYSTEM EVOLUTION ===
  EVOLVES_INTO:
    from: Class
    to: Class
    properties:
      requirements: { type: string }

  SKILL_EVOLVES_INTO:
    from: Skill
    to: Skill

  BELONGS_TO:
    from: Skill
    to: Class

  # === CREATURES ===
  INHABITS:
    from: Creature
    to: Location

validation_rules:
  type_exclusions:
    concept:
      excluded_terms:
        - stamina
        - mana
        - health
        - hp
        - mp
        - free points
        - skill points
        - experience
        - xp
        - level
        - attribute
        - stat
        - stat points
        - agility
        - strength
        - perception
        - vitality
        - willpower
        - wisdom
        - toughness
        - endurance
        - intelligence
        - luck
        - charisma
        - dexterity
      reason: "Game stats — use stat_change or genre_entity(sub_type=stat)"
    object:
      excluded_terms:
        - stamina
        - mana
        - health
        - hp
        - mp
        - xp
        - free points
        - skill points
      reason: "Game stats — not objects"
  domain_range:
    HAS_SKILL:
      from: [character]
      to: [skill, genre_entity]
    HAS_CLASS:
      from: [character]
      to: [class, genre_entity]
    HAS_TITLE:
      from: [character]
      to: [genre_entity]
    HAS_PROFESSION:
      from: [character]
      to: [genre_entity]
    LOCATED_AT:
      from: [character, object, event, creature, faction]
      to: [location]
    MEMBER_OF:
      from: [character]
      to: [faction]
    PARTICIPATES_IN:
      from: [character, creature]
      to: [event]
    POSSESSES:
      from: [character]
      to: [object, genre_entity]
    IS_RACE:
      from: [character]
      to: [genre_entity, creature]
